services:
  bot:
    build: .
    container_name: tama-ai-bot
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./data:/app/data
      - ./auth_info_multi:/app/auth_info_multi
      - ./.env:/app/.env:ro
    environment:
      - NODE_ENV=production
      - HEALTH_CHECK_PORT=8008
      - DASHBOARD_PORT=6680
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8008/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
